<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Scheduler</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #0d0d0d;
      --surface-1:   #161616;
      --surface-2:   #1f1f1f;
      --border:      #2a2a2a;
      --border-soft: #222;
      --text-1:      #f0f0f0;
      --text-2:      #a0a0a0;
      --text-3:      #505050;
      --accent:      #5b7cf6;
      --green:       #3d9e62;
      --green-bg:    #0d1f14;
      --green-border:#1e3d28;
      --red:         #d95f5f;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 1.5rem 6rem;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 3.5rem;
      width: 100%;
      max-width: 540px;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.72rem;
      color: var(--text-3);
      letter-spacing: 0.04em;
      margin-top: 0.25rem;
    }

    /* ── User bar ────────────────────────────────── */
    #user-bar {
      display: none;
      align-items: center;
      gap: 0.6rem;
      position: absolute;
      right: 0;
      top: 0;
    }

    #user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
    }

    #user-name {
      font-size: 0.75rem;
      color: var(--text-2);
      max-width: 140px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #user-bar a {
      font-size: 0.7rem;
      color: var(--text-3);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s;
    }

    #user-bar a:hover { color: var(--text-2); border-color: var(--text-3); }

    /* ── Login section ───────────────────────────── */
    #login-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-top: 2rem;
      text-align: center;
      max-width: 360px;
    }

    .login-desc {
      font-size: 0.85rem;
      color: var(--text-2);
      line-height: 1.65;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-1);
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-google:hover {
      border-color: var(--text-3);
      background: #242424;
    }

    #login-error {
      display: none;
      font-size: 0.75rem;
      color: var(--red);
    }

    /* ── App section (hidden until authenticated) ── */
    #app-section {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ── Orb button ─────────────────────────────── */
    .orb-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .orb-ring {
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 1px solid transparent;
      transition: border-color 0.3s, transform 0.3s;
      pointer-events: none;
    }

    #btn-toggle {
      position: relative;
      z-index: 1;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-3);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    #btn-toggle:hover:not(:disabled) {
      border-color: var(--text-3);
      color: var(--text-2);
      background: var(--surface-2);
    }

    #btn-toggle.active {
      border-color: var(--text-1);
      background: var(--text-1);
      color: var(--bg);
      font-weight: 600;
    }

    #btn-toggle.active ~ .orb-ring {
      border-color: rgba(240,240,240,0.12);
      animation: ring-pulse 2s ease-in-out infinite;
    }

    #btn-toggle.speaking {
      border-color: var(--accent);
      background: var(--surface-1);
      color: var(--accent);
    }

    #btn-toggle.speaking ~ .orb-ring {
      border-color: rgba(91,124,246,0.15);
      animation: ring-pulse 1.5s ease-in-out infinite;
    }

    #btn-toggle:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    @keyframes ring-pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.5; }
    }

    /* ── Status ─────────────────────────────────── */
    #status {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 3rem;
      min-height: 1rem;
      transition: color 0.25s;
    }

    #status.connecting { color: var(--text-2); }
    #status.listening  { color: var(--text-2); }
    #status.speaking   { color: var(--accent);  }
    #status.error      { color: var(--red);     }

    /* ── Calendar banner ────────────────────────── */
    #calendar-banner {
      display: none;
      width: 100%;
      max-width: 540px;
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      border-left: 3px solid var(--green);
      border-radius: 8px;
      padding: 0.8rem 1.1rem;
      margin-bottom: 1.5rem;
      font-size: 0.82rem;
      color: #a3d9b5;
      line-height: 1.55;
    }

    #calendar-banner a {
      color: #6fcf97;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Transcript ──────────────────────────────── */
    #transcript {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .turn {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }

    .turn.user       { align-self: flex-end;   }
    .turn.assistant  { align-self: flex-start;  }
    .turn.error-turn { align-self: flex-start;  }

    .turn-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.3rem;
      padding: 0 0.25rem;
    }

    .turn-bubble {
      padding: 0.7rem 0.95rem;
      border-radius: 10px;
      font-size: 0.855rem;
      line-height: 1.6;
      color: var(--text-1);
    }

    .turn.user .turn-bubble {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-right-radius: 3px;
      color: #d8d8d8;
    }

    .turn.assistant .turn-bubble {
      background: var(--surface-1);
      border: 1px solid var(--border-soft);
      border-bottom-left-radius: 3px;
      color: #c8c8c8;
    }

    .turn.error-turn .turn-bubble {
      background: #1a0f0f;
      border: 1px solid #3a1a1a;
      color: #e08080;
      border-bottom-left-radius: 3px;
    }

    /* ── Hint ───────────────────────────────────── */
    #hint {
      font-size: 0.72rem;
      color: var(--text-3);
      text-align: center;
      max-width: 300px;
      line-height: 1.65;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">🗓</div>
      <h1>Voice Scheduler</h1>
    </div>
    <p>Gemini 2.5 · Google Calendar</p>

    <!-- Shown once signed in -->
    <div id="user-bar">
      <img id="user-avatar" src="" alt="avatar" />
      <span id="user-name"></span>
      <a href="/auth/logout">Sign out</a>
    </div>
  </header>

  <!-- ── Login gate (shown when not authenticated) ─────────────────────── -->
  <div id="login-section">
    <p class="login-desc">
      Sign in with Google to schedule meetings directly to your Google Calendar.
    </p>
    <a href="/auth/login" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </a>
    <p id="login-error">Sign-in failed. Please try again.</p>
  </div>

  <!-- ── Main app (shown once authenticated) ──────────────────────────── -->
  <div id="app-section">
    <div class="orb-wrap">
      <button id="btn-toggle">Start</button>
      <div class="orb-ring"></div>
    </div>

    <div id="status">idle</div>

    <div id="calendar-banner"></div>
    <div id="transcript"></div>

    <p id="hint">Press Start, allow microphone access, then speak naturally to schedule a meeting.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
